framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    rate_limiter:
        transfer_by_account:
            policy: sliding_window
            limit: '%env(int:RATE_LIMIT_MAX)%'
            interval: '%env(int:RATE_LIMIT_WINDOW)% seconds'
            lock_factory: lock.default.factory
            cache_pool: cache.rate_limiter

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    php_errors:
        log: true

when@test:
    framework:
        test: true
