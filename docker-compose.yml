
networks:
  app_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:

services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-changeme_32chars_minimum_here_xx}
      DATABASE_URL: ${DATABASE_URL:-mysql://app:app_pass@mysql:3306/fund_transfer?serverVersion=8.0&charset=utf8mb4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-3600}
    volumes:
      - .:/var/www/html
    networks:
      - app_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_change_me
      MYSQL_DATABASE: fund_transfer
      MYSQL_USER: app
      MYSQL_PASSWORD: app_pass
    command: >
      --max_connections=50
      --innodb_buffer_pool_size=256M
      --innodb_flush_log_at_trx_commit=1
      --innodb_lock_wait_timeout=50
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-papp_pass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
